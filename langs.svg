<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200" fill="none">
  <style>
    .card {
      fill: #0d0b1a;
      stroke: url(#card-border-grad);
      stroke-width: 1.5;
      rx: 16px;
    }
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #00f2fe;
      letter-spacing: 0.5px;
    }
    .lang-name {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      fill: #ffffff;
      font-weight: 600;
    }
    .lang-pct {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 13px;
      fill: #9d9da6;
      font-weight: 700;
      text-anchor: end;
    }
    .progress-bg {
      fill: #1b192e;
      rx: 4px;
    }
    .progress-fill {
      rx: 4px;
      transform: scaleX(0);
      animation: growBar 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .fill-py { fill: #3b82f6; transform-origin: 30px 0; animation-delay: 0.1s; }
    .fill-java { fill: #fbbf24; transform-origin: 30px 0; animation-delay: 0.3s; }
    .fill-db { fill: #00f2fe; transform-origin: 30px 0; animation-delay: 0.5s; }
    .fill-web { fill: #ff2a85; transform-origin: 30px 0; animation-delay: 0.7s; }

    @keyframes growBar {
      to {
        transform: scaleX(1);
      }
    }
  </style>

  <defs>
    <linearGradient id="card-border-grad" x1="0" y1="0" x2="450" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff2a85" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect x="1" y="1" width="448" height="198" rx="16" class="card" />

  <g transform="translate(25, 0)">
    <!-- Title -->
    <text x="5" y="38" class="title">Top Languages &amp; Domains</text>

    <!-- Python -->
    <g transform="translate(5, 52)">
      <text x="0" y="12" class="lang-name">Python / AI / ML</text>
      <text x="390" y="12" class="lang-pct">50%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 50% of 390 is 195 -->
      <rect x="0" y="20" width="195" height="8" class="progress-fill fill-py" />
    </g>

    <!-- Java -->
    <g transform="translate(5, 87)">
      <text x="0" y="12" class="lang-name">Java / CS Fundamentals</text>
      <text x="390" y="12" class="lang-pct">20%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 20% of 390 is 78 -->
      <rect x="0" y="20" width="78" height="8" class="progress-fill fill-java" />
    </g>

    <!-- SQL -->
    <g transform="translate(5, 122)">
      <text x="0" y="12" class="lang-name">MySQL / Database</text>
      <text x="390" y="12" class="lang-pct">15%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 15% of 390 is 58.5 -->
      <rect x="0" y="20" width="58.5" height="8" class="progress-fill fill-db" />
    </g>

    <!-- React/Web -->
    <g transform="translate(5, 157)">
      <text x="0" y="12" class="lang-name">React / Frontend / HTML</text>
      <text x="390" y="12" class="lang-pct">15%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 15% of 390 is 58.5 -->
      <rect x="0" y="20" width="58.5" height="8" class="progress-fill fill-web" />
    </g>
  </g>
</svg>
