<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200" fill="none">
  <style>
    .card {
      fill: #0d0b1a;
      stroke: url(#card-border-grad);
      stroke-width: 1.5;
      rx: 16px;
    }
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #00f2fe;
      letter-spacing: 0.5px;
    }
    .lang-name {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      fill: #ffffff;
      font-weight: 600;
    }}
    .lang-pct {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-size: 13px;
      fill: #9d9da6;
      font-weight: 700;
      text-anchor: end;
    }
    .progress-bg {
      fill: #1b192e;
      rx: 4px;
    }
    .progress-fill {
      rx: 4px;
      transform: scaleX(0);
      animation: growBar 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .fill-js { fill: #f59e0b; transform-origin: 30px 0; animation-delay: 0.1s; }
    .fill-ts { fill: #3b82f6; transform-origin: 30px 0; animation-delay: 0.3s; }
    .fill-py { fill: #10b981; transform-origin: 30px 0; animation-delay: 0.5s; }
    .fill-react { fill: #06b6d4; transform-origin: 30px 0; animation-delay: 0.7s; }
    .fill-db { fill: #8b5cf6; transform-origin: 30px 0; animation-delay: 0.9s; }

    @keyframes growBar {
      to {
        transform: scaleX(1);
      }
    }
  </style>

  <defs>
    <linearGradient id="card-border-grad" x1="0" y1="0" x2="450" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff2a85" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect x="1" y="1" width="448" height="198" rx="16" class="card" />

  <g transform="translate(25, 0)">
    <!-- Title -->
    <text x="5" y="38" class="title">Top Languages &amp; Frameworks</text>

    <!-- JS -->
    <g transform="translate(5, 52)">
      <text x="0" y="12" class="lang-name">JavaScript</text>
      <text x="390" y="12" class="lang-pct">45%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 45% of 390 is 175.5 -->
      <rect x="0" y="20" width="175.5" height="8" class="progress-fill fill-js" />
    </g>

    <!-- TS -->
    <g transform="translate(5, 87)">
      <text x="0" y="12" class="lang-name">TypeScript</text>
      <text x="390" y="12" class="lang-pct">25%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 25% of 390 is 97.5 -->
      <rect x="0" y="20" width="97.5" height="8" class="progress-fill fill-ts" />
    </g>

    <!-- React -->
    <g transform="translate(5, 122)">
      <text x="0" y="12" class="lang-name">React / Next.js</text>
      <text x="390" y="12" class="lang-pct">18%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 18% of 390 is 70.2 -->
      <rect x="0" y="20" width="70.2" height="8" class="progress-fill fill-react" />
    </g>

    <!-- Python -->
    <g transform="translate(5, 157)">
      <text x="0" y="12" class="lang-name">Python / AI Tools</text>
      <text x="390" y="12" class="lang-pct">12%</text>
      <rect x="0" y="20" width="390" height="8" class="progress-bg" />
      <!-- 12% of 390 is 46.8 -->
      <rect x="0" y="20" width="46.8" height="8" class="progress-fill fill-py" />
    </g>
  </g>
</svg>
