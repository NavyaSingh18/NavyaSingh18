<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200" fill="none">
  <style>
    .card {
      fill: #0d0b1a;
      stroke: url(#card-border-grad);
      stroke-width: 1.5;
      rx: 16px;
    }
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #ff2a85;
      letter-spacing: 0.5px;
    }
    .stat-label {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      fill: #9d9da6;
      font-weight: 500;
    }
    .stat-value {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      fill: #ffffff;
      font-weight: 700;
      text-anchor: end;
    }
    .rank-text {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 32px;
      fill: #ff2a85;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .rank-circle-bg {
      stroke: #1b192e;
      stroke-width: 8;
      fill: none;
    }
    .rank-circle {
      stroke: url(#rank-grad);
      stroke-width: 8;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transform: rotate(-90deg);
      transform-origin: 80px 105px;
      animation: drawCircle 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .slide-in {
      opacity: 0;
      transform: translateX(20px);
      animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .row-1 { animation-delay: 0.2s; }
    .row-2 { animation-delay: 0.4s; }
    .row-3 { animation-delay: 0.6s; }
    .row-4 { animation-delay: 0.8s; }

    @keyframes drawCircle {
      to {
        stroke-dashoffset: 50.24; /* 80% completion */
      }
    }
    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>

  <defs>
    <linearGradient id="card-border-grad" x1="0" y1="0" x2="450" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2a85" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="rank-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2a85"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="1" y="1" width="448" height="198" rx="16" class="card" />

  <!-- Rank Ring (Left Side) -->
  <g transform="translate(0, 0)">
    <circle cx="80" cy="105" r="40" class="rank-circle-bg" />
    <circle cx="80" cy="105" r="40" class="rank-circle" filter="url(#glow)" />
    <!-- Fixed: changed cy to y, and adjusted to 109 to be perfectly vertically centered -->
    <text x="80" y="109" class="rank-text" filter="url(#glow)">S+</text>
    <text x="80" y="165" font-family="Inter" font-size="12" fill="#7928ca" text-anchor="middle" font-weight="600">RANKING</text>
  </g>

  <!-- Statistics (Right Side) -->
  <g transform="translate(170, 0)">
    <!-- Title -->
    <text x="0" y="40" class="title">Developer Stats</text>
    
    <!-- Fixed: nested group tags to separate vertical layout translation and horizontal slide-in transform -->
    <!-- Stat Item 1 -->
    <g transform="translate(0, 60)">
      <g class="slide-in row-1">
        <text x="0" y="12" class="stat-label">Total Commits</text>
        <text x="240" y="12" class="stat-value">1,482</text>
        <line x1="0" y1="24" x2="240" y2="24" stroke="#1f1b3a" stroke-width="1" />
      </g>
    </g>
    
    <!-- Stat Item 2 -->
    <g transform="translate(0, 92)">
      <g class="slide-in row-2">
        <text x="0" y="12" class="stat-label">Stars Earned</text>
        <text x="240" y="12" class="stat-value">342</text>
        <line x1="0" y1="24" x2="240" y2="24" stroke="#1f1b3a" stroke-width="1" />
      </g>
    </g>
    
    <!-- Stat Item 3 -->
    <g transform="translate(0, 124)">
      <g class="slide-in row-3">
        <text x="0" y="12" class="stat-label">Pull Requests</text>
        <text x="240" y="12" class="stat-value">186</text>
        <line x1="0" y1="24" x2="240" y2="24" stroke="#1f1b3a" stroke-width="1" />
      </g>
    </g>
    
    <!-- Stat Item 4 -->
    <g transform="translate(0, 156)">
      <g class="slide-in row-4">
        <text x="0" y="12" class="stat-label">Issues Closed</text>
        <text x="240" y="12" class="stat-value">94</text>
        <line x1="0" y1="24" x2="240" y2="24" stroke="#1f1b3a" stroke-width="1" />
      </g>
    </g>
  </g>
</svg>
